<script src="https://code.jquery.com/jquery-3.6.0.js"></script>
<script>
    $(function($){
        $("button").click(function(){
            $("div").animate({
                left:'250px',
                opacity:'0.5',
                height:'50px',
                width: '50px'
            });
        })
    })
</script>
<button>Start animation</button>
<div style="background:green;height:100px;width:100px;position:absolute;"></div>
